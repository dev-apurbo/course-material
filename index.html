<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Material</title>
  <style>
    :root {
      --bg-main: #eef2ff;
      --bg-accent: #f8fafc;
      --card-bg: #ffffff;
      --text-primary: #0f172a;
      --text-muted: #64748b;
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --border: #e2e8f0;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top right, #dbeafe 0%, transparent 45%),
        radial-gradient(circle at bottom left, #ede9fe 0%, transparent 40%),
        var(--bg-main);
      color: var(--text-primary);
      padding: 20px;
    }

    .bg-graphics {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-graphics .shape {
      position: absolute;
      animation: floatGraphic 20s infinite ease-in-out;
    }

    .bg-graphics .shape.circle {
      width: 250px;
      top: 5%;
      left: -5%;
      animation-delay: 0s;
    }

    .bg-graphics .shape.triangle {
      width: 200px;
      bottom: 10%;
      right: -2%;
      animation-delay: -5s;
    }

    .bg-graphics .shape.plus {
      width: 150px;
      top: 15%;
      right: 10%;
      animation-delay: -10s;
    }

    .bg-graphics .shape.dots {
      width: 300px;
      height: 300px;
      bottom: 5%;
      left: 5%;
      animation-delay: -15s;
    }

    .bg-graphics .shape.cat {
      width: 120px;
      top: 30%;
      left: 15%;
      animation-delay: -3s;
    }

    .bg-graphics .shape.dog {
      width: 140px;
      bottom: 25%;
      right: 20%;
      animation-delay: -8s;
    }

    @keyframes floatGraphic {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-40px) rotate(15deg);
      }
    }

    .bg-squares {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      margin: 0;
      padding: 0;
      z-index: -2;
    }

    .bg-squares li {
      position: absolute;
      display: block;
      list-style: none;
      width: 20px;
      height: 20px;
      background: rgba(37, 99, 235, 0.08);
      border: 1px solid rgba(37, 99, 235, 0.15);
      animation: floatSquare 25s linear infinite;
      bottom: -150px;
      border-radius: 8px;
    }

    .bg-squares li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
    .bg-squares li:nth-child(2) { left: 10%; width: 30px; height: 30px; animation-delay: 2s; animation-duration: 12s; }
    .bg-squares li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
    .bg-squares li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
    .bg-squares li:nth-child(5) { left: 65%; width: 40px; height: 40px; animation-delay: 0s; }
    .bg-squares li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
    .bg-squares li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
    .bg-squares li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
    .bg-squares li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
    .bg-squares li:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

    @keyframes floatSquare {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
        border-radius: 8px;
      }
      100% {
        transform: translateY(-1200px) rotate(720deg);
        opacity: 0;
        border-radius: 50%;
      }
    }

    footer {
      margin: 40px 0 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 50px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.04);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: default;
      user-select: none;
    }

    footer:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.8);
      border-color: var(--brand);
      box-shadow: 0 12px 40px rgba(37, 99, 235, 0.12);
      color: var(--text-primary);
    }

    footer .heart {
      color: #ff4d4d;
      font-size: 1rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.2);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 0.8;
      }
    }

    footer a {
      color: var(--brand);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    footer a:hover {
      color: var(--brand-dark);
      text-decoration: underline;
    }

    .footer-divider {
      opacity: 0.5;
      margin: 0 4px;
    }

    .container {
      width: min(760px, 96vw);
      padding: 30px 26px;
      background: var(--card-bg);
      border-radius: 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2.4vw, 2rem);
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .tutorial-link {
      display: inline-flex;
      align-items: center;
      background: #dbeafe;
      color: var(--brand-dark);
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid #bfdbfe;
      transition: all 0.2s ease;
      margin-left: 10px;
      box-shadow: 0 2px 4px rgba(37, 99, 235, 0.1);
    }

    .tutorial-link:hover {
      background: #bfdbfe;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(37, 99, 235, 0.15);
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 8px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    .controls label {
      color: var(--text-muted);
      font-weight: 500;
    }

    .controls select {
      border: 1px solid var(--border);
      background: var(--bg-accent);
      color: var(--text-primary);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .controls select:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
      border-color: var(--brand);
    }

    .controls input {
      border: 1px solid var(--border);
      background: var(--bg-accent);
      color: var(--text-primary);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.95rem;
      min-width: 200px;
      transition: all 0.2s ease;
    }

    .controls input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
      border-color: var(--brand);
      transform: scale(1.02);
    }

    .button-list {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    .course-card {
      display: grid;
      gap: 8px;
    }

    .course-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: stretch;
    }

    .course-button {
      padding: 14px 16px;
      background: var(--brand);
      color: white;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      display: block;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .course-button:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.28);
    }

    .course-button:active {
      transform: scale(0.97);
    }

    .course-button:focus-visible {
      outline: 2px solid #bfdbfe;
      outline-offset: 2px;
    }

    .course-toggle {
      border: none;
      min-width: 52px;
      padding: 14px 0;
      text-align: center;
    }

    .course-toggle-label {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1;
    }

    .sub-link-list {
      display: grid;
      gap: 8px;
      padding-left: 18px;
    }

    .sub-link {
      display: block;
      padding: 11px 14px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }

    .sub-link:hover {
      background: #e0e7ff;
      border-color: #bfdbfe;
      transform: translateY(-1px);
    }

    .sub-link:focus-visible {
      outline: 2px solid #bfdbfe;
      outline-offset: 2px;
    }

    .sub-link:active {
      transform: scale(0.97);
    }

    .note {
      margin: 6px 0 0;
      color: var(--text-muted);
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .status-message {
      margin-top: 14px;
      color: var(--text-muted);
      background: #f8fafc;
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    @keyframes slideUpFade {
      0% {
        opacity: 0;
        transform: translateY(15px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-item {
      opacity: 0;
      animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px 18px;
      }

      .controls {
        width: 100%;
        justify-content: space-between;
      }

      .controls input {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>

<body>
  <ul class="bg-squares">
    <li></li><li></li><li></li><li></li><li></li>
    <li></li><li></li><li></li><li></li><li></li>
  </ul>
  <div class="bg-graphics">
    <svg class="shape circle" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="40" stroke="#60a5fa" stroke-width="6" fill="none" opacity="0.3" />
    </svg>
    <svg class="shape triangle" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,15 90,85 10,85" stroke="#c084fc" stroke-width="6" fill="none" opacity="0.3" />
    </svg>
    <svg class="shape plus" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M42,15 L58,15 L58,42 L85,42 L85,58 L58,58 L58,85 L42,85 L42,58 L15,58 L15,42 L42,42 Z" fill="#38bdf8"
        opacity="0.2" />
    </svg>
    <svg class="shape dots" width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <pattern id="dotsPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
        <circle fill="#818cf8" fill-opacity="0.3" cx="3" cy="3" r="3"></circle>
      </pattern>
      <rect x="0" y="0" width="100%" height="100%" fill="url(#dotsPattern)"></rect>
    </svg>
    <svg class="shape cat" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path fill="#f472b6" opacity="0.4" d="M20,80 C20,50 80,50 80,80 Z" />
      <path fill="#f472b6" opacity="0.4" d="M20,60 L10,30 L40,50 Z" />
      <path fill="#f472b6" opacity="0.4" d="M80,60 L90,30 L60,50 Z" />
      <circle cx="35" cy="65" r="5" fill="#fff" opacity="0.8" />
      <circle cx="65" cy="65" r="5" fill="#fff" opacity="0.8" />
      <polygon points="50,75 45,70 55,70" fill="#fff" opacity="0.8" />
    </svg>
    <svg class="shape dog" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="60" r="30" fill="#fb923c" opacity="0.4" />
      <ellipse cx="20" cy="50" rx="15" ry="30" fill="#fb923c" opacity="0.4" transform="rotate(-20 20 50)" />
      <ellipse cx="80" cy="50" rx="15" ry="30" fill="#fb923c" opacity="0.4" transform="rotate(20 80 50)" />
      <circle cx="40" cy="55" r="4" fill="#fff" opacity="0.8" />
      <circle cx="60" cy="55" r="4" fill="#fff" opacity="0.8" />
      <circle cx="50" cy="70" r="6" fill="#fff" opacity="0.8" />
    </svg>
  </div>
  <div class="container">
    <div class="header">
      <div>
        <h1>Brac University courses</h1>
        <p class="subtitle" style="display: flex; align-items: center;">CSE <a href="tutorial.html"
            class="tutorial-link">💡 How to Use</a></p>
      </div>
      <div class="controls">
        <label for="searchCourse">Search:</label>
        <input id="searchCourse" type="search" placeholder="Search by course name..."
          aria-label="Search courses by name" />
        <label for="sortBy">Sort:</label>
        <select id="sortBy" aria-label="Sort courses by name">
          <option value="az">Course Name (A-Z)</option>
          <option value="za">Course Name (Z-A)</option>
        </select>
      </div>
    </div>
    <p class="note">Select a course to open its Google Drive folder.</p>
    <div id="buttons" class="button-list"></div>
  </div>
  <footer>
    <span>Submit files: <a id="contactEmail" href="mailto:code.cse.bracu@gmail.com">code.cse.bracu@gmail.com</a></span>
    <span class="footer-divider">•</span>
    <span>Made with <span class="heart">♥</span> for Bracu Students</span>
  </footer>
  <script>
    const buttons = document.getElementById('buttons');
    const sortBy = document.getElementById('sortBy');
    const searchCourse = document.getElementById('searchCourse');
    let courses = [];
    let expandedCourseName = null;

    function getFilteredAndSortedCourses() {
      const searchText = searchCourse.value.trim().toLowerCase();
      const filtered = courses.filter(course =>
        (course.name || '').toLowerCase().includes(searchText)
      );

      const sorted = [...filtered];
      const isDesc = sortBy.value === 'za';

      sorted.sort((a, b) => {
        const nameA = (a.name || '').trim();
        const nameB = (b.name || '').trim();
        return isDesc
          ? nameB.localeCompare(nameA, undefined, { sensitivity: 'base' })
          : nameA.localeCompare(nameB, undefined, { sensitivity: 'base' });
      });

      return sorted;
    }

    function renderCourses() {
      buttons.innerHTML = '';

      if (!Array.isArray(courses) || courses.length === 0) {
        buttons.innerHTML = '<p class="status-message">No courses found in courses.json.</p>';
        return;
      }

      const sortedCourses = getFilteredAndSortedCourses();

      if (sortedCourses.length === 0) {
        buttons.innerHTML = '<p class="status-message">No matching courses found.</p>';
        return;
      }

      sortedCourses.forEach((course, index) => {
        const hasSubLinks = Array.isArray(course.subLinks) && course.subLinks.length > 0;
        const animationDelay = `${index * 0.05}s`;

        if (hasSubLinks) {
          const courseCard = document.createElement('div');
          courseCard.className = 'course-card animate-item';
          courseCard.style.animationDelay = animationDelay;

          const isExpanded = expandedCourseName === course.name;
          const courseRow = document.createElement('div');
          courseRow.className = 'course-row';

          const courseLink = document.createElement('a');
          courseLink.className = 'course-button';
          courseLink.textContent = course.name || 'Open Course';

          if (course.googleDriveLink) {
            courseLink.href = course.googleDriveLink;
            courseLink.target = '_blank';
            courseLink.rel = 'noopener noreferrer';
          } else {
            courseLink.href = '#';
            courseLink.addEventListener('click', event => {
              event.preventDefault();
              alert('No Google Drive link defined for this course.');
            });
          }

          const courseToggle = document.createElement('button');
          courseToggle.type = 'button';
          courseToggle.className = 'course-button course-toggle';
          courseToggle.setAttribute('aria-expanded', String(isExpanded));
          courseToggle.setAttribute('aria-label', isExpanded ? `Hide links for ${course.name}` : `Show links for ${course.name}`);
          courseToggle.innerHTML = `<span class="course-toggle-label">${isExpanded ? '-' : '+'}</span>`;
          courseToggle.addEventListener('click', () => {
            expandedCourseName = isExpanded ? null : course.name;
            renderCourses();
          });

          courseRow.appendChild(courseLink);
          courseRow.appendChild(courseToggle);
          courseCard.appendChild(courseRow);

          if (isExpanded) {
            const subLinkList = document.createElement('div');
            subLinkList.className = 'sub-link-list';

            course.subLinks.forEach((subLink, subIndex) => {
              const link = document.createElement('a');
              link.className = 'sub-link animate-item';
              link.style.animationDelay = `${(subIndex + 1) * 0.04}s`;
              link.textContent = subLink.label || 'Open Link';

              if (subLink.url) {
                link.href = subLink.url;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
              } else {
                link.href = '#';
                link.addEventListener('click', event => {
                  event.preventDefault();
                  alert('No link defined for this option yet.');
                });
              }

              subLinkList.appendChild(link);
            });
            courseCard.appendChild(subLinkList);
          }

          buttons.appendChild(courseCard);
        } else {
          const courseLink = document.createElement('a');
          courseLink.className = 'course-button animate-item';
          courseLink.style.animationDelay = animationDelay;
          courseLink.textContent = course.name || 'Open Course';

          if (course.googleDriveLink) {
            courseLink.href = course.googleDriveLink;
            courseLink.target = '_blank';
            courseLink.rel = 'noopener noreferrer';
          } else {
            courseLink.href = '#';
            courseLink.addEventListener('click', event => {
              event.preventDefault();
              alert('No Google Drive link defined for this course.');
            });
          }

          buttons.appendChild(courseLink);
        }
      });
    }

    async function loadCourses() {
      try {
        const response = await fetch('courses.json');
        if (!response.ok) throw new Error('Unable to load courses.json');
        const data = await response.json();
        courses = Array.isArray(data.courses) ? data.courses : [];
        renderCourses();
      } catch (error) {
        buttons.innerHTML = '<p class="status-message">Failed to load course data.</p>';
        console.error(error);
      }
    }

    function setupContactLink() {
      const emailLink = document.getElementById('contactEmail');
      const email = 'code.cse.bracu@gmail.com';
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      if (isMobile) {
        // Mobile: Use mailto to open the Gmail app
        emailLink.href = `mailto:${email}`;
      } else {
        // PC: Use Gmail web interface
        emailLink.href = `https://mail.google.com/mail/?view=cm&fs=1&to=${email}`;
        emailLink.target = '_blank';
        emailLink.rel = 'noopener noreferrer';
      }
    }

    sortBy.addEventListener('change', renderCourses);
    searchCourse.addEventListener('input', renderCourses);
    loadCourses();
    setupContactLink();
  </script>
</body>

</html>
