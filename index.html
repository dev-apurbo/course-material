<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Explorer</title>
  <style>
    :root {
      --bg-main: #eef2ff;
      --bg-accent: #f8fafc;
      --card-bg: #ffffff;
      --text-primary: #0f172a;
      --text-muted: #64748b;
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --border: #e2e8f0;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top right, #dbeafe 0%, transparent 45%),
        radial-gradient(circle at bottom left, #ede9fe 0%, transparent 40%),
        var(--bg-main);
      color: var(--text-primary);
      padding: 20px;
    }

    .container {
      width: min(760px, 96vw);
      padding: 30px 26px;
      background: var(--card-bg);
      border-radius: 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2.4vw, 2rem);
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 8px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    .controls label {
      color: var(--text-muted);
      font-weight: 500;
    }

    .controls select {
      border: 1px solid var(--border);
      background: var(--bg-accent);
      color: var(--text-primary);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .controls select:focus {
      outline: 2px solid #bfdbfe;
      border-color: #93c5fd;
    }

    .controls input {
      border: 1px solid var(--border);
      background: var(--bg-accent);
      color: var(--text-primary);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.95rem;
      min-width: 200px;
    }

    .controls input:focus {
      outline: 2px solid #bfdbfe;
      border-color: #93c5fd;
    }

    .button-list {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    .course-card {
      display: grid;
      gap: 8px;
    }

    .course-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: stretch;
    }

    .course-button {
      padding: 14px 16px;
      background: var(--brand);
      color: white;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      display: block;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .course-button:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.28);
    }

    .course-button:active {
      transform: translateY(0);
    }

    .course-button:focus-visible {
      outline: 2px solid #bfdbfe;
      outline-offset: 2px;
    }

    .course-toggle {
      border: none;
      min-width: 52px;
      padding: 14px 0;
      text-align: center;
    }

    .course-toggle-label {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1;
    }

    .sub-link-list {
      display: grid;
      gap: 8px;
      padding-left: 18px;
    }

    .sub-link {
      display: block;
      padding: 11px 14px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }

    .sub-link:hover {
      background: #e0e7ff;
      border-color: #bfdbfe;
      transform: translateY(-1px);
    }

    .sub-link:focus-visible {
      outline: 2px solid #bfdbfe;
      outline-offset: 2px;
    }

    .note {
      margin: 6px 0 0;
      color: var(--text-muted);
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .status-message {
      margin-top: 14px;
      color: var(--text-muted);
      background: #f8fafc;
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px 18px;
      }

      .controls {
        width: 100%;
        justify-content: space-between;
      }

      .controls input {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Brac University courses</h1>
        <p class="subtitle">CSE</p>
      </div>
      <div class="controls">
        <label for="searchCourse">Search:</label>
        <input
          id="searchCourse"
          type="search"
          placeholder="Search by course name..."
          aria-label="Search courses by name"
        />
        <label for="sortBy">Sort:</label>
        <select id="sortBy" aria-label="Sort courses by name">
          <option value="az">Course Name (A-Z)</option>
          <option value="za">Course Name (Z-A)</option>
        </select>
      </div>
    </div>
    <p class="note">Select a course to open its Google Drive folder.</p>
    <div id="buttons" class="button-list"></div>
  </div>
  <script>
    const buttons = document.getElementById('buttons');
    const sortBy = document.getElementById('sortBy');
    const searchCourse = document.getElementById('searchCourse');
    let courses = [];
    let expandedCourseName = null;

    function getFilteredAndSortedCourses() {
      const searchText = searchCourse.value.trim().toLowerCase();
      const filtered = courses.filter(course =>
        (course.name || '').toLowerCase().includes(searchText)
      );

      const sorted = [...filtered];
      const isDesc = sortBy.value === 'za';

      sorted.sort((a, b) => {
        const nameA = (a.name || '').trim();
        const nameB = (b.name || '').trim();
        return isDesc
          ? nameB.localeCompare(nameA, undefined, { sensitivity: 'base' })
          : nameA.localeCompare(nameB, undefined, { sensitivity: 'base' });
      });

      return sorted;
    }

    function renderCourses() {
      buttons.innerHTML = '';

      if (!Array.isArray(courses) || courses.length === 0) {
        buttons.innerHTML = '<p class="status-message">No courses found in courses.json.</p>';
        return;
      }

      const sortedCourses = getFilteredAndSortedCourses();

      if (sortedCourses.length === 0) {
        buttons.innerHTML = '<p class="status-message">No matching courses found.</p>';
        return;
      }

      sortedCourses.forEach(course => {
        const hasSubLinks = Array.isArray(course.subLinks) && course.subLinks.length > 0;

        if (hasSubLinks) {
          const courseCard = document.createElement('div');
          courseCard.className = 'course-card';

          const isExpanded = expandedCourseName === course.name;
          const courseRow = document.createElement('div');
          courseRow.className = 'course-row';

          const courseLink = document.createElement('a');
          courseLink.className = 'course-button';
          courseLink.textContent = course.name || 'Open Course';

          if (course.googleDriveLink) {
            courseLink.href = course.googleDriveLink;
            courseLink.target = '_blank';
            courseLink.rel = 'noopener noreferrer';
          } else {
            courseLink.href = '#';
            courseLink.addEventListener('click', event => {
              event.preventDefault();
              alert('No Google Drive link defined for this course.');
            });
          }

          const courseToggle = document.createElement('button');
          courseToggle.type = 'button';
          courseToggle.className = 'course-button course-toggle';
          courseToggle.setAttribute('aria-expanded', String(isExpanded));
          courseToggle.setAttribute('aria-label', isExpanded ? `Hide links for ${course.name}` : `Show links for ${course.name}`);
          courseToggle.innerHTML = `<span class="course-toggle-label">${isExpanded ? '-' : '+'}</span>`;
          courseToggle.addEventListener('click', () => {
            expandedCourseName = isExpanded ? null : course.name;
            renderCourses();
          });

          courseRow.appendChild(courseLink);
          courseRow.appendChild(courseToggle);
          courseCard.appendChild(courseRow);

          if (isExpanded) {
            const subLinkList = document.createElement('div');
            subLinkList.className = 'sub-link-list';

            course.subLinks.forEach(subLink => {
              const link = document.createElement('a');
              link.className = 'sub-link';
              link.textContent = subLink.label || 'Open Link';

              if (subLink.url) {
                link.href = subLink.url;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
              } else {
                link.href = '#';
                link.addEventListener('click', event => {
                  event.preventDefault();
                  alert('No link defined for this option yet.');
                });
              }

              subLinkList.appendChild(link);
            });
            courseCard.appendChild(subLinkList);
          }

          buttons.appendChild(courseCard);
        } else {
          const courseLink = document.createElement('a');
          courseLink.className = 'course-button';
          courseLink.textContent = course.name || 'Open Course';

          if (course.googleDriveLink) {
            courseLink.href = course.googleDriveLink;
            courseLink.target = '_blank';
            courseLink.rel = 'noopener noreferrer';
          } else {
            courseLink.href = '#';
            courseLink.addEventListener('click', event => {
              event.preventDefault();
              alert('No Google Drive link defined for this course.');
            });
          }

          buttons.appendChild(courseLink);
        }
      });
    }

    async function loadCourses() {
      try {
        const response = await fetch('courses.json');
        if (!response.ok) throw new Error('Unable to load courses.json');
        const data = await response.json();
        courses = Array.isArray(data.courses) ? data.courses : [];
        renderCourses();
      } catch (error) {
        buttons.innerHTML = '<p class="status-message">Failed to load course data.</p>';
        console.error(error);
      }
    }

    sortBy.addEventListener('change', renderCourses);
    searchCourse.addEventListener('input', renderCourses);
    loadCourses();
  </script>
</body>
</html>
